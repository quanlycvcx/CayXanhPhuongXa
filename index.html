<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Hạ Tầng Xanh T9</title>
    
    <!-- Thư viện hỗ trợ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --accent: #1a73e8;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background: var(--bg); color: var(--text); padding: 15px; }

        .container {
            max-width: 1600px;
            margin: auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            min-height: 90vh;
        }

        /* Header & Status */
        header { padding: 20px 30px; background: #fff; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        header h1 { color: var(--primary); font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .status-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #f1f5f9; }
        .st-success { background: #e8f5e9; color: var(--primary); }
        .st-loading { background: #fff4e5; color: #d35400; }

        /* Navigation Tabs */
        .nav-tabs { display: flex; background: #f8fafc; padding: 10px 20px 0; border-bottom: 1px solid var(--border); gap: 5px; }
        .tab-btn {
            padding: 12px 20px; cursor: pointer; border: none; background: none;
            font-weight: 600; color: #64748b; border-radius: 8px 8px 0 0;
            transition: 0.3s; font-size: 14px;
        }
        .tab-btn.active { background: #fff; color: var(--primary); border: 1px solid var(--border); border-bottom: 2px solid #fff; margin-bottom: -1px; }

        .tab-content { display: none; padding: 25px; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }

        /* KPI & Charts Layout (Tab 1) */
        .dashboard-grid { display: grid; grid-template-columns: 300px 1fr; gap: 25px; }
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--primary); text-align: center; }
        .kpi-card span { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 700; }
        .kpi-card b { display: block; font-size: 24px; color: var(--primary); margin-top: 5px; }

        /* Search Boxes */
        .search-box { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; }
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #64748b; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27, 94, 32, 0.1); }

        /* Tables */
        .table-area { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; max-height: 600px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); color: #64748b; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); background: #fff; }
        tr:hover td { background: #f1f5f9; }

        /* OCR Layout */
        .ocr-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .dropzone { border: 2px dashed var(--border); border-radius: 15px; padding: 50px; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; }
        .dropzone:hover { border-color: var(--accent); background: #f0f7ff; }
        #previewImg { max-width: 100%; border-radius: 10px; margin-top: 20px; border: 1px solid var(--border); }
        .ocr-result { background: #fff; border: 1px solid var(--border); border-radius: 15px; padding: 25px; }
        .coord-box { background: #e8f0fe; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .coord-val { font-family: monospace; font-size: 24px; font-weight: 700; color: var(--accent); }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-accent { background: var(--accent); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1000px) { .dashboard-grid, .ocr-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Quản lý Cây xanh & Hạ tầng T9</h1>
        <div class="status-group">
            <div id="stTrees" class="status-badge st-loading">Cây xanh: Đang tải...</div>
            <div id="stTD" class="status-badge st-loading">Thủ Đức: Đang tải...</div>
            <div id="stBD" class="status-badge st-loading">Bình Dương: Đang tải...</div>
        </div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tabTrees')">Tra cứu Cây xanh</button>
        <button class="tab-btn" onclick="openTab(event, 'tabTD')">Tuyến đường Thủ Đức</button>
        <button class="tab-btn" onclick="openTab(event, 'tabBD')">Tuyến đường Bình Dương</button>
        <button class="tab-btn" onclick="openTab(event, 'tabOCR')">Trích tọa độ từ ảnh</button>
    </div>

    <!-- TAB 1: TRA CỨU CÂY XANH (DASHBOARD) -->
    <div id="tabTrees" class="tab-content active">
        <div class="dashboard-grid">
            <div class="search-box">
                <div class="filter-group"><label>Phường</label><input type="text" id="fTreeWard" placeholder="Vd: An Khánh..."></div>
                <div class="filter-group"><label>Tên đường</label><input type="text" id="fTreeStreet" placeholder="Vd: Trần Não..."></div>
                <div class="filter-group"><label>Tên loài cây</label><input type="text" id="fTreeSpecies" placeholder="Vd: Sao đen..."></div>
                <div class="filter-group"><label>Số hiệu cây</label><input type="text" id="fTreeID" placeholder="Nhập số hiệu..."></div>
                <button class="btn btn-primary" onclick="filterTrees()">LỌC DỮ LIỆU</button>
            </div>
            <div>
                <div class="kpi-row">
                    <div class="kpi-card"><span>Tổng số cây</span><b id="kpiTotal">0</b></div>
                    <div class="kpi-card"><span>Số loài</span><b id="kpiSpecies">0</b></div>
                    <div class="kpi-card"><span>Tuyến đường</span><b id="kpiStreets">0</b></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 25px;">
                    <div class="search-box" style="background: #fff;"><canvas id="treeChart" style="max-height: 250px;"></canvas></div>
                    <div class="table-area" style="max-height: 250px;">
                        <table style="min-width: auto;">
                            <thead><tr><th>Tên Đường</th><th>Số lượng</th></tr></thead>
                            <tbody id="treeSummaryBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="table-area"><table id="treeTable"><thead><tr id="treeHead"></tr></thead><tbody id="treeBody"></tbody></table></div>
            </div>
        </div>
    </div>

    <!-- TAB 2: THỦ ĐỨC -->
    <div id="tabTD" class="tab-content">
        <div class="search-box" style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
            <div style="flex: 1;"><label style="font-size: 12px; font-weight: 700; color: #64748b;">Tên đường (viết tắt/có dấu)</label><input type="text" id="fTDStreet" oninput="filterRoads('TD')"></div>
            <div style="flex: 1;"><label style="font-size: 12px; font-weight: 700; color: #64748b;">Phường / Khu vực</label><input type="text" id="fTDWard" oninput="filterRoads('TD')"></div>
            <div style="flex: 1;"><label style="font-size: 12px; font-weight: 700; color: #64748b;">Đơn vị duy tu</label><input type="text" id="fTDComp" oninput="filterRoads('TD')"></div>
        </div>
        <div class="table-area"><table id="tableTD"><thead><tr id="headTD"></tr></thead><tbody id="bodyTD"></tbody></table></div>
    </div>

    <!-- TAB 3: BÌNH DƯƠNG -->
    <div id="tabBD" class="tab-content">
        <div class="search-box" style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
            <div style="flex: 1;"><label style="font-size: 12px; font-weight: 700; color: #64748b;">Tên đường (viết tắt/có dấu)</label><input type="text" id="fBDStreet" oninput="filterRoads('BD')"></div>
            <div style="flex: 1;"><label style="font-size: 12px; font-weight: 700; color: #64748b;">Phường / Xã</label><input type="text" id="fBDWard" oninput="filterRoads('BD')"></div>
            <div style="flex: 1;"><label style="font-size: 12px; font-weight: 700; color: #64748b;">Đơn vị duy tu</label><input type="text" id="fBDComp" oninput="filterRoads('BD')"></div>
        </div>
        <div class="table-area"><table id="tableBD"><thead><tr id="headBD"></tr></thead><tbody id="bodyBD"></tbody></table></div>
    </div>

    <!-- TAB 4: TRÍCH TỌA ĐỘ -->
    <div id="tabOCR" class="tab-content">
        <div class="ocr-container">
            <div>
                <div class="dropzone" id="dropzone"><p>Kéo thả ảnh Timemark vào đây hoặc nhấp để chọn file</p><input type="file" id="ocrInput" accept="image/*" style="display:none"></div>
                <div id="ocrLoader" style="display:none; text-align:center; padding:20px; color:var(--accent); font-weight: 700;">Đang phân tích hình ảnh AI...</div>
                <img id="previewImg" style="display:none;">
            </div>
            <div class="ocr-result" id="ocrResult" style="display:none;">
                <div class="coord-box"><div id="resCoords" class="coord-val">---</div><div style="margin-top:10px;"><button class="btn btn-accent" onclick="copyCoords()">SAO CHÉP TỌA ĐỘ</button> <a id="resMaps" target="_blank" class="btn btn-primary" style="width:auto;">XEM BẢN ĐỒ</a></div></div>
                <table class="info-table">
                    <tr><td>Thời gian:</td><td id="resTime" style="font-weight:700;">-</td></tr>
                    <tr><td>Ngày:</td><td id="resDate" style="font-weight:700;">-</td></tr>
                    <tr><td>Địa chỉ:</td><td id="resAddr" style="font-weight:700;">-</td></tr>
                </table>
            </div>
        </div>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    // --- CẤU HÌNH DỮ LIỆU ---
    const URL_TREES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQiHzB1J4YZQeBZt-LpVGJDwdOwauzcxklhhNzOTgmxUsiKR_zdpr6qs28yLUnAG_MfWAshhe3eFG9W/pub?gid=195844642&single=true&output=csv';
    const URL_TD = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSDBsLFYFoxn-SE2MQDETNgQrri1V3PxqEhWKxBghGXJr1FNb4LkjXg1PcawYnli_yFVQeyv2-PMv7/pub?gid=195844642&single=true&output=tsv';
    const URL_BD = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTKUfkZtVRIva2X9gwaOKo2ZNMHw2h1BZce-9-MQ4rei0kWY339PCY9WDWK7vjM7uQyRPAyZVPqDUU-/pub?gid=195844642&single=true&output=tsv';

    let dbTrees = [], dbTD = [], dbBD = [];
    let headsTrees = [], headsTD = [], headsBD = [];
    let myChart;

    Chart.register(ChartDataLabels);

    // --- KHỞI TẠO ---
    window.onload = function() {
        loadData(URL_TREES, 'Trees');
        loadData(URL_TD, 'TD');
        loadData(URL_BD, 'BD');
    };

    function openTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // --- TẢI DỮ LIỆU ---
    function loadData(url, type) {
        const isTSV = (url.includes('output=tsv'));
        Papa.parse(url, {
            download: true, skipEmptyLines: true,
            complete: function(results) {
                const raw = results.data;
                if(type === 'Trees') {
                    headsTrees = raw[0];
                    dbTrees = raw.slice(1);
                    document.getElementById('treeHead').innerHTML = headsTrees.map(h => `<th>${h}</th>`).join('');
                    updateStatus('stTrees', dbTrees.length);
                    filterTrees();
                } else if(type === 'TD') {
                    const data = results.data.map(row => row[0].split('\t')); // Xử lý TSV
                    headsTD = data[0];
                    dbTD = data.slice(1);
                    document.getElementById('headTD').innerHTML = headsTD.map(h => `<th>${h}</th>`).join('');
                    updateStatus('stTD', dbTD.length);
                    filterRoads('TD');
                } else {
                    const data = results.data.map(row => row[0].split('\t'));
                    headsBD = data[0];
                    dbBD = data.slice(1);
                    document.getElementById('headBD').innerHTML = headsBD.map(h => `<th>${h}</th>`).join('');
                    updateStatus('stBD', dbBD.length);
                    filterRoads('BD');
                }
            }
        });
    }

    function updateStatus(id, count) {
        const el = document.getElementById(id);
        el.innerText = (id.includes('Trees') ? 'Cây xanh: ' : (id.includes('TD') ? 'Thủ Đức: ' : 'Bình Dương: ')) + count + ' dữ liệu';
        el.className = 'status-badge st-success';
    }

    // --- XỬ LÝ TAB 1: CÂY XANH ---
    function filterTrees() {
        const qW = document.getElementById('fTreeWard').value.toLowerCase();
        const qS = document.getElementById('fTreeStreet').value.toLowerCase();
        const qSp = document.getElementById('fTreeSpecies').value.toLowerCase();
        const qID = document.getElementById('fTreeID').value.toLowerCase();

        const filtered = dbTrees.filter(r => 
            (!qW || (r[6] && r[6].toLowerCase().includes(qW))) &&
            (!qS || (r[8] && r[8].toLowerCase().includes(qS))) &&
            (!qSp || (r[10] && r[10].toLowerCase().includes(qSp))) &&
            (!qID || (r[11] && r[11].toLowerCase().includes(qID)))
        );

        document.getElementById('kpiTotal').innerText = filtered.length.toLocaleString();
        document.getElementById('kpiSpecies').innerText = new Set(filtered.map(r => r[10])).size;
        document.getElementById('kpiStreets').innerText = new Set(filtered.map(r => r[8])).size;

        renderTreeSummary(filtered);
        updateTreeChart(filtered);
        renderTable('treeBody', filtered.slice(0, 300));
    }

    function renderTreeSummary(data) {
        const counts = {};
        data.forEach(r => counts[r[8]] = (counts[r[8]] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 10);
        document.getElementById('treeSummaryBody').innerHTML = sorted.map(s => `<tr><td><b>${s[0]}</b></td><td><span style="background:#e8f5e9; padding:2px 8px; border-radius:5px; font-weight:700;">${s[1]} cây</span></td></tr>`).join('');
    }

    function updateTreeChart(data) {
        const counts = {};
        data.forEach(r => counts[r[10] || 'Khác'] = (counts[r[10]] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 5);
        const labels = sorted.map(s => s[0]);
        const vals = sorted.map(s => s[1]);

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('treeChart'), {
            type: 'pie',
            data: { labels: labels, datasets: [{ data: vals, backgroundColor: ['#1b5e20','#388e3c','#66bb6a','#81c784','#a5d6a7'] }] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                    datalabels: { color: '#fff', font: { weight: 'bold', size: 9 }, formatter: (v, ctx) => {
                        let sum = 0; ctx.chart.data.datasets[0].data.map(d => sum += d);
                        return (v*100/sum).toFixed(1) + "%";
                    }}
                }
            }
        });
    }

    // --- XỬ LÝ TAB 2 & 3: TUYẾN ĐƯỜNG ---
    function filterRoads(type) {
        const qS = cleanVN(document.getElementById(`f${type}Street`).value);
        const qW = cleanVN(document.getElementById(`f${type}Ward`).value);
        const qC = cleanVN(document.getElementById(`f${type}Comp`).value);

        const data = (type === 'TD') ? dbTD : dbBD;
        const filtered = data.filter(r => {
            const valS = r[1] || '', valW = r[2] || '', valC = r[r.length-1] || '';
            const matchS = !qS || cleanVN(valS).includes(qS) || getInitials(valS).includes(qS);
            const matchW = !qW || cleanVN(valW).includes(qW);
            const matchC = !qC || cleanVN(valC).includes(qC) || getInitials(valC).includes(qC);
            return matchS && matchW && matchC;
        });

        renderTable(type === 'TD' ? 'bodyTD' : 'bodyBD', filtered);
    }

    // --- XỬ LÝ TAB 4: OCR ---
    const dropzone = document.getElementById('dropzone');
    const ocrInput = document.getElementById('ocrInput');

    dropzone.onclick = () => ocrInput.click();
    ocrInput.onchange = e => handleOcr(e.target.files[0]);
    dropzone.ondragover = e => { e.preventDefault(); dropzone.style.borderColor = 'var(--accent)'; };
    dropzone.ondrop = e => { e.preventDefault(); handleOcr(e.dataTransfer.files[0]); };

    async function handleOcr(file) {
        if(!file || !file.type.startsWith('image/')) return;
        document.getElementById('ocrResult').style.display = 'none';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('ocrLoader').style.display = 'block';

        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = async () => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewImg').style.display = 'block';
                const canvas = document.getElementById('helperCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // Tiền xử lý ảnh OCR
                const d = ctx.getImageData(0,0,canvas.width,canvas.height);
                for (let i=0; i<d.data.length; i+=4) {
                    let avg = (d.data[i]+d.data[i+1]+d.data[i+2])/3;
                    let v = (avg > 185) ? 255 : 0;
                    d.data[i] = d.data[i+1] = d.data[i+2] = v;
                }
                ctx.putImageData(d,0,0);

                const worker = await Tesseract.createWorker(['vie','eng']);
                const { data: { text } } = await worker.recognize(canvas.toDataURL());
                parseOcr(text);
                await worker.terminate();
                document.getElementById('ocrLoader').style.display = 'none';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function parseOcr(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
        const clean = text.replace(/,/g, '.');
        const latM = clean.match(/(\d{1,2}\.\d{4,})\s?[°o0\*]?\s?N/i);
        const lngM = clean.match(/(\d{2,3}\.\d{4,})\s?[°o0\*]?\s?E/i);
        const timeM = text.match(/\b\d{1,2}:\d{2}\b/);
        const dateM = text.match(/\d{1,2}\s+(Tháng|tháng)\s+\d{1,2},\s+\d{4}/i);

        if(latM && lngM) {
            const lat = latM[1], lng = lngM[1];
            document.getElementById('resCoords').innerText = `${lat}, ${lng}`;
            document.getElementById('resMaps').href = `https://www.google.com/maps?q=${lat},${lng}`;
            document.getElementById('resTime').innerText = timeM ? timeM[0] : '---';
            document.getElementById('resDate').innerText = dateM ? dateM[0] : '---';
            const cIdx = lines.findIndex(l => l.includes(lat.substring(0,5)));
            document.getElementById('resAddr').innerText = cIdx > 0 ? lines[cIdx-1] : 'Không xác định địa chỉ';
            document.getElementById('ocrResult').style.display = 'block';
        } else { alert("Không tìm thấy tọa độ GPS!"); }
    }

    // --- HELPER FUNCTIONS ---
    function renderTable(id, data) {
        document.getElementById(id).innerHTML = data.map(r => `<tr>${r.map(c => `<td>${c || ''}</td>`).join('')}</tr>`).join('');
    }

    function cleanVN(str) {
        if(!str) return '';
        return str.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d");
    }

    function getInitials(str) {
        if(!str) return '';
        return cleanVN(str).split(/\s+/).map(w => w[0]).join('');
    }

    function copyCoords() {
        const t = document.getElementById('resCoords').innerText;
        navigator.clipboard.writeText(t).then(() => alert("Đã sao chép tọa độ!"));
    }
</script>
</body>
</html>
